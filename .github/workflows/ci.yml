name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      # v5 runs on Node 24, replacing the v4 Node-20 actions deprecated by
      # GitHub on 2025-09-19 and force-bumped on 2026-06-02.
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Surfaces known CVEs without blocking the build yet; tighten to blocking once the baseline is clean.
      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Lint (Biome)
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (with coverage)
        run: pnpm test:coverage

  # Integration tests boot the full API against a real Postgres (with pgvector)
  # and exercise HTTP routes via app.inject(). The unit job above skips these
  # because TEST_DATABASE_URL is unset there.
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: innolope
          POSTGRES_PASSWORD: innolope
          POSTGRES_DB: innolope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U innolope"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://innolope:innolope@localhost:5432/innolope_test
      TEST_DATABASE_URL: postgres://innolope:innolope@localhost:5432/innolope_test
      AUTH_SECRET: ci-test-secret-at-least-32-characters-long
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.8.1

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # No migration step: booting the app (buildTestApp) runs ensureTables(),
      # which creates the full schema on the empty Postgres service.
      - name: Integration tests
        run: pnpm --filter @innolope/api test

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: innolope
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/innolope
      AUTH_SECRET: dev-secret-change-in-production-32chars
      API_PORT: 3001
      API_HOST: 0.0.0.0
      ADMIN_URL: http://localhost:8080
    depends_on:
      - postgres

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
